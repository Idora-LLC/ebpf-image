name: Build CI Recorder

on:
  push:
    branches: [main, github-action]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev build-essential pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install nightly + bpf-linker
        run: |
          rustup install nightly
          rustup component add rust-src --toolchain nightly
          cargo install bpf-linker

      - name: Build eBPF program
        run: cargo xtask build-ebpf --profile release

      - name: Build userspace binary
        run: cargo build --package ci-tracer --release

      - name: Package action
        run: |
          mkdir -p dist/bin dist/action
          cp target/release/ci-tracer dist/bin/
          cp action/*.js dist/action/
          cp action.yml dist/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-tracer-linux-x64
          path: dist/

      - name: Test binary loads
        run: |
          sudo mount -t debugfs debugfs /sys/kernel/debug 2>/dev/null || true
          sudo mount -t tracefs tracefs /sys/kernel/tracing 2>/dev/null || true
          sudo timeout 3 ./target/release/ci-tracer || true
          echo "Binary runs successfully"
